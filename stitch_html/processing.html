<div class="absolute inset-0 w-full h-full opacity-60 mix-blend-screen pointer-events-none z-0" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;

float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
    vec2 center = uv - 0.5;
    center.x *= u_resolution.x / u_resolution.y;

    // Deep dark background
    vec3 color = vec3(0.047, 0.047, 0.063); // #0c0c10 - deep dark but not black

    // Atmospheric glows
    float glow1 = 0.5 / length(center - vec2(sin(u_time * 0.5) * 0.5, cos(u_time * 0.3) * 0.3));
    float glow2 = 0.4 / length(center - vec2(cos(u_time * 0.4) * 0.4, sin(u_time * 0.6) * 0.4));
    
    color += vec3(0.0, 0.94, 1.0) * glow1 * 0.05; // Cyan glow
    color += vec3(0.6, 0.0, 1.0) * glow2 * 0.05; // Purple glow

    // Floating particles
    for(int i = 0; i < 40; i++) {
        float f_i = float(i);
        vec2 p = vec2(random(vec2(f_i, 123.0)), random(vec2(f_i, 456.0)));
        p.y = fract(p.y - u_time * 0.05);
        
        float dist = length(uv - p);
        float particle = 0.001 / dist;
        particle *= smoothstep(0.1, 0.0, dist);
        
        color += vec3(0.5, 0.8, 1.0) * particle * random(vec2(f_i));
    }

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        document.addEventListener("DOMContentLoaded", () => {
            const progressBar = document.getElementById('progress-bar-fill');
            const percentageDisplay = document.getElementById('percentage-display');
            const statusContainer = document.getElementById('status-text-container');
            const statusIcon = document.getElementById('status-icon');
            
            const statuses = [
                { text: "Initializing ValidX engine...", icon: "memory", targetProgress: 10 },
                { text: "Analyzing headers...", icon: "find_in_page", targetProgress: 35 },
                { text: "Validating transaction IDs...", icon: "fact_check", targetProgress: 60 },
                { text: "Cross-referencing schemas...", icon: "schema", targetProgress: 75 },
                { text: "Cleaning anomalous data...", icon: "cleaning_services", targetProgress: 90 },
                { text: "Finalizing payload...", icon: "task_alt", targetProgress: 100 }
            ];

            let currentProgress = 0;
            let currentStatusIndex = 0;
            
            const renderStatusText = (text) => {
                const p = document.createElement('p');
                p.className = 'font-code-sm text-code-sm text-on-surface-variant w-full text-center truncate transition-opacity duration-300 opacity-0';
                p.textContent = text;
                return p;
            };

            const animateProgress = () => {
                if (currentProgress >= 100) {
                    setTimeout(() => {
                        statusIcon.textContent = "check_circle";
                        statusIcon.classList.remove('text-primary-fixed');
                        statusIcon.classList.add('text-tertiary-fixed');
                        percentageDisplay.classList.remove('text-primary-fixed');
                        percentageDisplay.classList.add('text-tertiary-fixed');
                        progressBar.classList.remove('bg-primary-fixed');
                        progressBar.classList.add('bg-tertiary-fixed');
                        
                        const finalP = renderStatusText("Processing Complete.");
                        finalP.classList.remove('text-on-surface-variant');
                        finalP.classList.add('text-tertiary-fixed');
                        statusContainer.innerHTML = '';
                        statusContainer.appendChild(finalP);
                        requestAnimationFrame(() => finalP.classList.remove('opacity-0'));
                    }, 500);
                    return;
                }

                currentProgress += Math.random() * 0.8;
                if (currentProgress > 100) currentProgress = 100;

                progressBar.style.width = `${currentProgress}%`;
                percentageDisplay.textContent = `${Math.floor(currentProgress)}%`;

                if (currentStatusIndex < statuses.length && currentProgress >= statuses[currentStatusIndex].targetProgress) {
                    const status = statuses[currentStatusIndex];
                    
                    const newEl = renderStatusText(status.text);
                    statusContainer.innerHTML = '';
                    statusContainer.appendChild(newEl);
                    
                    statusIcon.style.opacity = 0;
                    setTimeout(() => {
                        statusIcon.textContent = status.icon;
                        statusIcon.style.opacity = 1;
                    }, 150);
                    
                    requestAnimationFrame(() => {
                        newEl.classList.remove('opacity-0');
                        newEl.classList.add('text-primary');
                    });
                    
                    currentStatusIndex++;
                }

                requestAnimationFrame(animateProgress);
            };

            const initialP = renderStatusText(statuses[0].text);
            statusContainer.innerHTML = '';
            statusContainer.appendChild(initialP);
            initialP.classList.remove('opacity-0');
            initialP.classList.add('text-primary');

            setTimeout(() => {
                requestAnimationFrame(animateProgress);
            }, 500);
        });
    </script>
